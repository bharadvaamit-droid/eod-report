<!DOCTYPE html>
<html>
<head>
    <title>EOD Reporting</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body { font-family: Arial; margin: 20px; }
        input, select { margin: 5px; padding: 5px; }
        button { padding: 8px 14px; cursor: pointer; background:#0078d4;color:#fff;border:none;border-radius:4px;}
        button:hover { background:#005fa3; }
        table { border-collapse: collapse; width: 100%; margin-top: 20px;}
        th, td { border: 1px solid #ccc; padding: 8px;}
        th { background: #f0f0f0;}
        h2 { margin-top:30px;}
    </style>
</head>

<body>

<h1>EOD Report Entry</h1>

<form id="reportForm">
    <label>Name:</label>
    <input type="text" id="name" required><br>

    <label>Department:</label>
    <select id="department">
        <option>Engineer</option>
        <option>Sales</option>
        <option>Purchase</option>
    </select><br>

    <label>Partner:</label>
    <input type="text" id="partner"><br>

    <label>Hours:</label>
    <input type="number" id="hours"><br>

    <label>Blocker:</label>
    <input type="text" id="blocker"><br><br>

    <button type="submit">Submit</button>
</form>

<hr>

<h2>Reports Dashboard</h2>

<table>
    <thead>
        <tr>
            <th>Name</th>
            <th>Dept</th>
            <th>Partner</th>
            <th>Hours</th>
        </tr>
    </thead>
    <tbody id="reportTable"></tbody>
</table>

<script>

// ✅ YOUR API URLs
const SAVE_API = "https://eod-api-ckeqf8c6ajc9f6fh.centralindia-01.azurewebsites.net/api/HttpTrigger1";
const GET_API = "https://eod-api-ckeqf8c6ajc9f6fh.centralindia-01.azurewebsites.net/api/getReports";

//
// ✅ SUBMIT FIX (CRITICAL — THIS WAS MISSING)
//
document.getElementById("reportForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const data = {
        name: document.getElementById("name").value,
        department: document.getElementById("department").value,
        partner: document.getElementById("partner").value,
        hours: parseInt(document.getElementById("hours").value) || 0,
        blocker: document.getElementById("blocker").value
    };

    console.log("Submitting:", data);

    try {
        const res = await fetch(SAVE_API, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(data)
        });

        const msg = await res.text();

        console.log("API response:", msg);

        alert("Saved ✅");

        // ✅ refresh data after save
        loadReports();

    } catch (err) {
        console.error("Submit error:", err);
        alert("Error saving ❌");
    }
});


//
// ✅ LOAD REPORTS FROM DATABASE
//
async function loadReports() {
    try {
        const res = await fetch(GET_API);
        const data = await res.json();

        const table = document.getElementById("reportTable");
        table.innerHTML = "";

        data.forEach(r => {
            const row = document.createElement("tr");

            row.innerHTML = `
                <td>${r.Name}</td>
                <td>${r.Department}</td>
                <td>${r.Partner}</td>
                <td>${r.Hours}</td>
            `;

            table.appendChild(row);
        });

    } catch (err) {
        console.error("Load error:", err);
    }
}


// ✅ AUTO LOAD DASHBOARD
loadReports();

</script>

</body>
</html>
