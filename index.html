<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luova — End of Day Reporting</title>
<style>
  :root{
    --navy:#13233F; --navy-2:#1B2F50; --navy-3:#284A77; --navy-4:#35608F;
    --green:#74B12C; --green-d:#5E9023; --green-soft:#EDF4E1;
    --ink:#1C2737; --slate:#566576; --muted:#8593A3;
    --paper:#EEF2F7; --card:#FFFFFF; --line:#DEE5EE; --line-2:#EAEFF5;
    --field:#F5F8FC;
    --shadow:0 1px 2px rgba(19,35,63,.06),0 8px 24px rgba(19,35,63,.07);
    --sidebar:256px;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{font-family:"Inter",-apple-system,"Segoe UI",Roboto,system-ui,sans-serif;background:var(--paper);color:var(--ink);line-height:1.5;font-size:14px;}
  .app{display:flex;min-height:100vh;}

  /* SIDEBAR — solid navy with subtle gradient depth */
  .sidebar{width:var(--sidebar);background:linear-gradient(180deg,#16294A 0%,#11203A 100%);color:#fff;flex-shrink:0;display:flex;flex-direction:column;position:fixed;inset:0 auto 0 0;z-index:30;transition:transform .25s;}
  .sb-head{padding:22px 20px 18px;border-bottom:1px solid rgba(255,255,255,.08);}
  .sb-head img{height:52px;margin-bottom:14px;display:block;}
  .sb-head .t{font-weight:800;font-size:15px;letter-spacing:1.2px;line-height:1.25;color:#fff;}
  .sb-head .t span{color:var(--green);display:block;font-size:11px;letter-spacing:2px;font-weight:600;margin-top:3px;}
  .sb-sec{padding:20px 20px 8px;font-size:9.5px;font-weight:700;letter-spacing:1.5px;color:#69829F;text-transform:uppercase;}
  .nav{display:flex;flex-direction:column;gap:2px;padding:0 12px;}
  .nav button{display:flex;align-items:center;gap:12px;padding:11px 13px;border-radius:8px;background:none;border:none;color:#AFC0D4;font-size:13.5px;font-weight:500;cursor:pointer;font-family:inherit;text-align:left;width:100%;transition:.13s;border-left:3px solid transparent;}
  .nav button svg{width:18px;height:18px;flex-shrink:0;opacity:.85;}
  .nav button:hover{background:rgba(255,255,255,.06);color:#fff;}
  .nav button:hover svg{opacity:1;}
  .nav button.active{background:rgba(116,177,44,.16);color:#fff;font-weight:600;border-left-color:var(--green);}
  .nav button.active svg{opacity:1;color:var(--green);}
  .sb-foot{margin-top:auto;padding:16px 20px;font-size:10px;color:#65789A;border-top:1px solid rgba(255,255,255,.08);letter-spacing:.2px;line-height:1.6;}

  .main{flex:1;margin-left:var(--sidebar);min-width:0;}
  .topbar{background:var(--card);border-bottom:1px solid var(--line);padding:0 26px;height:60px;display:flex;align-items:center;gap:13px;position:sticky;top:0;z-index:20;}
  .topbar .pg{font-weight:700;font-size:16px;color:var(--navy);}
  .topbar .right{margin-left:auto;display:flex;align-items:center;gap:10px;}
  .pill{font-size:12px;font-weight:600;background:var(--navy);color:#fff;padding:5px 13px;border-radius:6px;}
  .hamb{display:none;background:none;border:none;font-size:21px;cursor:pointer;color:var(--navy);}
  .content{padding:26px;max-width:1180px;}
  .scrim{display:none;position:fixed;inset:0;background:rgba(19,35,63,.5);z-index:25;}
  @media(max-width:880px){.sidebar{transform:translateX(-100%);}.sidebar.open{transform:translateX(0);}.main{margin-left:0;}.hamb{display:block;}.scrim.show{display:block;}.content{padding:18px;}}

  .sec{background:var(--card);border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow);padding:20px;margin-bottom:16px;}
  .sec-h{display:flex;align-items:center;gap:10px;margin-bottom:16px;padding-bottom:13px;border-bottom:1px solid var(--line-2);}
  .sec-h .b{width:4px;height:16px;border-radius:2px;background:var(--green);}
  .sec-h h3{font-size:14px;font-weight:700;color:var(--navy);letter-spacing:.2px;}
  .fld{margin-bottom:14px;} .fld:last-child{margin-bottom:0;}
  .fld label{display:block;font-size:11px;font-weight:600;letter-spacing:.4px;color:var(--slate);text-transform:uppercase;margin-bottom:7px;}
  .fld input,.fld select,.fld textarea{width:100%;padding:11px 13px;font-size:14.5px;color:var(--ink);font-family:inherit;border:1px solid var(--line);border-radius:8px;background:var(--field);transition:.12s;}
  .fld input:focus,.fld select:focus,.fld textarea:focus{outline:none;border-color:var(--navy-3);background:#fff;box-shadow:0 0 0 3px rgba(40,74,119,.1);}
  .fld textarea{resize:vertical;min-height:60px;}
  .req::after{content:" *";color:var(--green-d);}
  .two{display:flex;gap:13px;flex-wrap:wrap;} .two>.fld{flex:1;min-width:150px;}
  .hint{font-size:11.5px;color:var(--muted);margin-top:6px;}
  .seg{display:flex;gap:8px;}
  .seg button{flex:1;padding:11px;font-size:14px;font-weight:600;color:var(--slate);background:var(--field);border:1px solid var(--line);border-radius:8px;cursor:pointer;font-family:inherit;transition:.12s;}
  .seg button.on{background:var(--navy);border-color:var(--navy);color:#fff;}
  .counts{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;}
  @media(min-width:560px){.counts{grid-template-columns:repeat(3,1fr);}}
  .cnt{background:var(--field);border:1px solid var(--line);border-radius:10px;padding:13px;}
  .cnt .cl{font-size:10.5px;font-weight:600;letter-spacing:.3px;color:var(--slate);text-transform:uppercase;min-height:28px;display:flex;align-items:center;}
  .cnt select,.cnt input{width:100%;margin-top:8px;padding:10px;font-size:16px;font-weight:700;text-align:center;border:1px solid var(--line);border-radius:7px;background:#fff;color:var(--navy);font-family:inherit;}
  .cnt input{font-size:15px;}
  .task-row{display:flex;align-items:center;gap:10px;margin-bottom:9px;}
  .task-row .tn{font-size:11px;font-weight:700;color:var(--green-d);min-width:48px;}
  .task-row input{flex:1;padding:10px 12px;font-size:14px;border:1px solid var(--line);border-radius:8px;background:var(--field);color:var(--ink);font-family:inherit;}
  .task-row input:focus{outline:none;border-color:var(--navy-3);background:#fff;}
  .linkbtn{background:none;border:none;color:var(--navy-3);font-size:13px;cursor:pointer;font-family:inherit;font-weight:600;padding:7px 0;}
  .submit{display:block;width:100%;padding:15px;margin-top:4px;font-size:15px;font-weight:700;letter-spacing:.3px;color:#fff;background:var(--green);border:none;border-radius:9px;cursor:pointer;font-family:inherit;transition:.12s;}
  .submit:hover{background:var(--green-d);} .submit:active{transform:translateY(1px);}
  .errfield{border-color:#C0392B!important;background:#FCF3F2!important;}

  .center-wrap{max-width:400px;margin:48px auto;padding:0 18px;}
  .pin-card{background:var(--card);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);padding:34px 28px;text-align:center;}
  .pin-card .ic{width:58px;height:58px;border-radius:13px;background:var(--navy);color:#fff;display:flex;align-items:center;justify-content:center;margin:0 auto 15px;}
  .pin-card .ic svg{width:28px;height:28px;}
  .pin-card h2{font-size:18px;font-weight:700;color:var(--navy);}
  .pin-card p{color:var(--slate);font-size:13px;margin:6px 0 22px;}
  .pin-row{display:flex;gap:11px;justify-content:center;margin-bottom:8px;}
  .pin-row input{width:54px;height:60px;text-align:center;font-size:24px;font-weight:700;border:1px solid var(--line);border-radius:10px;background:var(--field);color:var(--navy);}
  .pin-row input:focus{outline:none;border-color:var(--navy-3);background:#fff;box-shadow:0 0 0 3px rgba(40,74,119,.12);}
  .err-msg{color:#C0392B;font-size:12.5px;font-weight:600;min-height:18px;}

  .done{background:var(--card);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);padding:40px 24px;text-align:center;max-width:440px;margin:34px auto;}
  .done .ok{width:64px;height:64px;border-radius:50%;background:var(--green-soft);color:var(--green-d);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:32px;}
  .done h2{font-size:19px;font-weight:700;color:var(--navy);} .done p{color:var(--slate);font-size:13.5px;margin:8px 0 22px;}
  .btn2{display:inline-block;padding:12px 26px;font-size:14.5px;font-weight:700;color:#fff;background:var(--navy);border:none;border-radius:8px;cursor:pointer;font-family:inherit;}

  .tabs{display:flex;gap:4px;background:var(--card);border:1px solid var(--line);border-radius:10px;padding:4px;margin-bottom:18px;width:fit-content;}
  .tabs button{padding:9px 18px;font-size:13.5px;font-weight:600;color:var(--slate);background:none;border:none;border-radius:7px;cursor:pointer;font-family:inherit;}
  .tabs button.on{background:var(--navy);color:#fff;}
  .kpis{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-bottom:18px;}
  @media(min-width:680px){.kpis{grid-template-columns:repeat(4,1fr);}}
  .kpi{background:var(--card);border:1px solid var(--line);border-radius:11px;box-shadow:var(--shadow);padding:16px 17px;position:relative;overflow:hidden;}
  .kpi::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--green);}
  .kpi .v{font-size:27px;font-weight:800;line-height:1;color:var(--navy);}
  .kpi .l{font-size:11px;color:var(--slate);margin-top:7px;font-weight:600;letter-spacing:.2px;}
  .ctrlbar{display:flex;gap:14px;flex-wrap:wrap;align-items:end;background:var(--card);border:1px solid var(--line);border-radius:11px;box-shadow:var(--shadow);padding:15px 17px;margin-bottom:18px;}
  .ctrlbar .fld{margin:0;} .ctrlbar .fld label{margin-bottom:5px;}
  .ctrlbar input,.ctrlbar select{padding:9px 11px;border:1px solid var(--line);border-radius:7px;font-family:inherit;font-size:13.5px;background:var(--field);}
  table{width:100%;border-collapse:collapse;background:var(--card);font-size:13px;}
  th{background:var(--navy);color:#E6EDF5;text-align:left;padding:11px 13px;font-size:10.5px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;white-space:nowrap;}
  td{padding:10px 13px;border-bottom:1px solid var(--line-2);white-space:nowrap;color:var(--ink);}
  tr:last-child td{border-bottom:none;}
  tr:nth-child(even) td{background:#FAFCFE;}
  .tnum{text-align:center;font-variant-numeric:tabular-nums;}
  .pct{font-weight:700;} .pct.good{color:var(--green-d);} .pct.mid{color:var(--slate);} .pct.low{color:#C0392B;}
  .rate-sel{padding:6px 8px;border:1px solid var(--line);border-radius:6px;font-family:inherit;font-size:12.5px;background:#fff;}
  .rev-input{width:150px;padding:7px 9px;border:1px solid var(--line);border-radius:6px;font-family:inherit;font-size:12.5px;background:var(--field);}
  .dept-title{font-size:14px;font-weight:700;color:var(--navy);margin:22px 0 11px;display:flex;align-items:center;gap:9px;}
  .dept-title svg{width:17px;height:17px;color:var(--navy-3);}
  .empty{background:var(--card);border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow);padding:46px 20px;text-align:center;color:var(--slate);}
  .tablewrap{overflow-x:auto;border:1px solid var(--line);border-radius:11px;box-shadow:var(--shadow);}
  .act{display:inline-flex;gap:6px;}
  .act button{width:28px;height:28px;border:1px solid var(--line);background:#fff;border-radius:6px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;color:var(--slate);}
  .act button:hover{border-color:var(--navy-3);color:var(--navy);}
  .act button.del:hover{border-color:#C0392B;color:#C0392B;}
  .act svg{width:14px;height:14px;}

  .chart-card{background:var(--card);border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow);padding:20px;margin-bottom:18px;}
  .chart-card h4{font-size:13.5px;font-weight:700;color:var(--navy);margin-bottom:4px;}
  .chart-card .csub{font-size:11.5px;color:var(--muted);margin-bottom:16px;}
  .chart-grid{display:grid;grid-template-columns:1fr;gap:18px;}
  @media(min-width:820px){.chart-grid.two{grid-template-columns:1fr 1fr;}}

  .seed{font-size:12px;color:var(--navy-3);background:none;border:1px solid var(--navy-3);border-radius:7px;padding:7px 13px;cursor:pointer;font-family:inherit;font-weight:600;}
  .toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(90px);background:var(--navy);color:#fff;padding:12px 22px;border-radius:8px;font-size:13.5px;font-weight:600;transition:.25s;z-index:60;box-shadow:var(--shadow);}
  .toast.show{transform:translateX(-50%) translateY(0);}

  /* modal */
  .modal-bg{display:none;position:fixed;inset:0;background:rgba(19,35,63,.55);z-index:70;align-items:flex-start;justify-content:center;padding:40px 16px;overflow:auto;}
  .modal-bg.show{display:flex;}
  .modal{background:var(--card);border-radius:14px;box-shadow:0 20px 60px rgba(0,0,0,.3);width:100%;max-width:520px;}
  .modal-h{padding:18px 20px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;}
  .modal-h h3{font-size:15px;font-weight:700;color:var(--navy);}
  .modal-h button{background:none;border:none;font-size:22px;color:var(--muted);cursor:pointer;line-height:1;}
  .modal-b{padding:20px;}
  .modal-f{padding:14px 20px;border-top:1px solid var(--line);display:flex;gap:10px;justify-content:flex-end;}
  .btn-ghost{padding:10px 18px;border:1px solid var(--line);background:#fff;border-radius:8px;font-weight:600;font-size:13.5px;cursor:pointer;font-family:inherit;color:var(--slate);}
  .btn-save{padding:10px 20px;border:none;background:var(--green);color:#fff;border-radius:8px;font-weight:700;font-size:13.5px;cursor:pointer;font-family:inherit;}
  .btn-danger{padding:10px 20px;border:none;background:#C0392B;color:#fff;border-radius:8px;font-weight:700;font-size:13.5px;cursor:pointer;font-family:inherit;}
</style>
</head>

function buildNav(){
  const n=$("deptNav"); n.innerHTML="";
  Object.entries(DEPTS).forEach(([k,d])=>{
    const b=document.createElement("button");
    b.dataset.dept=k; b.innerHTML=`${IC[d.ic]} ${k}`;
    b.onclick=()=>go({dept:k}); n.appendChild(b);
  });
  const ab=document.querySelector('[data-admin]');
  ab.innerHTML=`${IC.admin} Admin Dashboard`;
  ab.onclick=()=>go({admin:true});
  $("yr").textContent=new Date().getFullYear();
}
function setActive(){
  document.querySelectorAll(".nav button").forEach(b=>b.classList.remove("active"));
  if(view&&view.dept) document.querySelector(`[data-dept="${view.dept}"]`)?.classList.add("active");
  if(view&&view.admin) document.querySelector('[data-admin]')?.classList.add("active");
}
function go(v){ view=v; closeSidebar(); render(); }
function render(){
  setActive();
  const c=$("content"), tr=$("topRight");
  if(!view){ $("pageTitle").textContent="Welcome"; tr.innerHTML=""; c.innerHTML=welcomeHTML(); return; }
  if(view.admin){
    if(!authed.admin){ $("pageTitle").textContent="Admin"; tr.innerHTML=""; c.innerHTML=pinHTML("Admin Dashboard",IC.admin,"Enter the admin PIN"); wirePin("admin"); return; }
    $("pageTitle").textContent="Admin Dashboard"; tr.innerHTML=`<button class="seed" id="seedBtn">+ Sample data</button>`;
    c.innerHTML=adminHTML(); wireAdmin(); return;
  }
  const d=DEPTS[view.dept];
  if(!authed[view.dept]){ $("pageTitle").textContent=view.dept; tr.innerHTML=""; c.innerHTML=pinHTML(view.dept,IC[d.ic],"Enter your team PIN"); wirePin(view.dept); return; }

  c.innerHTML=formHTML(); wireForm();
}

function lineChart(data){const W=440,H=200,pad=34;if(!data.length)return"<div class='empty'>No data</div>";
  const max=Math.max(...data.map(d=>d.value),1),stepX=data.length>1?(W-pad*2)/(data.length-1):0;
  const pts=data.map((d,i)=>[pad+i*stepX,H-pad-(d.value/max)*(H-pad*2)]);
  const path=pts.map((p,i)=>(i?"L":"M")+p[0].toFixed(1)+" "+p[1].toFixed(1)).join(" ");
  const area=path+` L ${pts[pts.length-1][0].toFixed(1)} ${H-pad} L ${pts[0][0].toFixed(1)} ${H-pad} Z`;
  let grid="";for(let g=0;g<=4;g++){const y=pad+g*(H-pad*2)/4;grid+=`<line x1="${pad}" y1="${y}" x2="${W-pad}" y2="${y}" stroke="#EAEFF5"/><text x="${pad-6}" y="${y+3}" text-anchor="end" font-size="9" fill="#8593A3">${Math.round(max-(g*max/4))}</text>`;}
  let xl=data.map((d,i)=>(data.length>8&&i%2)?"":`<text x="${(pad+i*stepX).toFixed(1)}" y="${H-pad+14}" text-anchor="middle" font-size="8.5" fill="#8593A3">${d.label}</text>`).join("");
  let dots=pts.map(p=>`<circle cx="${p[0].toFixed(1)}" cy="${p[1].toFixed(1)}" r="3" fill="${GREEN}"/>`).join("");
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto">${grid}<path d="${area}" fill="${GREEN}" opacity="0.1"/><path d="${path}" fill="none" stroke="${GREEN}" stroke-width="2.5" stroke-linejoin="round"/>${dots}${xl}</svg>`;}
function barChart(data,color,pct){const W=440,H=200,pad=34;if(!data.length)return"<div class='empty'>No data</div>";
  const max=pct?100:Math.max(...data.map(d=>d.value),1),bw=(W-pad*2)/data.length*0.55,gap=(W-pad*2)/data.length;
  let grid="";for(let g=0;g<=4;g++){const y=pad+g*(H-pad*2)/4;grid+=`<line x1="${pad}" y1="${y}" x2="${W-pad}" y2="${y}" stroke="#EAEFF5"/><text x="${pad-6}" y="${y+3}" text-anchor="end" font-size="9" fill="#8593A3">${Math.round(max-(g*max/4))}</text>`;}
  let bars=data.map((d,i)=>{const h=(d.value/max)*(H-pad*2),x=pad+i*gap+(gap-bw)/2,y=H-pad-h;
    return `<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${bw.toFixed(1)}" height="${h.toFixed(1)}" rx="3" fill="${color}"/><text x="${(x+bw/2).toFixed(1)}" y="${(y-5).toFixed(1)}" text-anchor="middle" font-size="9.5" font-weight="700" fill="${NAVY}">${d.value}${pct?'%':''}</text><text x="${(x+bw/2).toFixed(1)}" y="${H-pad+14}" text-anchor="middle" font-size="8.5" fill="#8593A3">${d.label.length>7?d.label.slice(0,6)+'…':d.label}</text>`;}).join("");
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto">${grid}${bars}</svg>`;}
function barChartH(data){if(!data.length)return"<div class='empty'>No data</div>";
  const W=440,rowH=26,pad=8,labelW=120,H=pad*2+data.length*rowH,max=Math.max(...data.map(d=>d.value),1);
  let bars=data.map((d,i)=>{const y=pad+i*rowH,bw=(d.value/max)*(W-labelW-40);
    return `<text x="${labelW-8}" y="${y+rowH/2+3}" text-anchor="end" font-size="10.5" fill="${NAVY}">${d.label.length>16?d.label.slice(0,15)+'…':d.label}</text><rect x="${labelW}" y="${y+4}" width="${Math.max(bw,2).toFixed(1)}" height="${rowH-12}" rx="3" fill="${GREEN}"/><text x="${labelW+Math.max(bw,2)+6}" y="${y+rowH/2+3}" font-size="10" font-weight="700" fill="${NAVY}">${d.value}</text>`;}).join("");
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto">${bars}</svg>`;}
function computeKPI(dep,rr){const sum=m=>rr.reduce((s,r)=>s+(+(r.counts[m]||0)),0);let num=0,den=0;
  if(dep==="Engineer"){const a=sum("Completed tasks"),b=sum("Tasks in progress"),c=sum("Tasks pending");num=a;den=a+b+c;}
  else if(dep==="Sales"){const o=sum("Orders received"),q=sum("Quotations pending");num=o;den=o+q;}
  else if(dep==="Purchase"){const m=sum("Materials received"),dd=sum("Delayed materials");num=dd;den=m+dd;}
  else if(dep==="Dispatch"){const a=sum("Dispatches completed"),b=sum("Pending dispatches");num=a;den=a+b;}
  else if(dep==="Account"){const p=sum("Payments received"),pp=sum("Payments pending");num=p;den=p+pp;}
  return den?Math.round(num/den*100):0;}
